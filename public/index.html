<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Quotex USA</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#06142b;
color:white;
padding-bottom:90px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0c1b35;
border-bottom:1px solid #1d2d4d;
}

.logo{
font-size:22px;
font-weight:bold;
color:#17d65c;
}

.balance{
background:#1b2b4a;
padding:12px 20px;
border-radius:14px;
font-size:18px;
font-weight:bold;
}

.deposit-btn{
background:#22d15f;
padding:12px 20px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
color:white;
}

.selects{
padding:15px;
display:flex;
gap:10px;
}

.selects select{
flex:1;
background:#142544;
color:white;
border:none;
padding:15px;
border-radius:14px;
font-size:16px;
}

.chart-box{
height:420px;
margin:10px;
border-radius:16px;
overflow:hidden;
background:#08152d;
}

.trade-box{
display:flex;
gap:10px;
padding:15px;
}

.trade-card{
flex:1;
background:#132340;
padding:20px;
border-radius:18px;
}

.trade-card h3{
font-size:18px;
color:#9fb3d9;
margin-bottom:15px;
}

.trade-card input{
width:100%;
background:transparent;
border:none;
font-size:35px;
color:white;
outline:none;
}

.buttons{
display:flex;
gap:12px;
padding:15px;
}

.up{
flex:1;
background:#20d45e;
padding:22px;
border:none;
border-radius:18px;
font-size:35px;
font-weight:bold;
color:white;
}

.down{
flex:1;
background:#f44343;
padding:22px;
border:none;
border-radius:18px;
font-size:35px;
font-weight:bold;
color:white;
}

.section{
padding:15px;
}

.card{
background:#10203d;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

.card input{
width:100%;
padding:18px;
border:none;
border-radius:12px;
margin-top:10px;
background:#192b4d;
color:white;
font-size:18px;
}

.card button{
width:100%;
padding:18px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#22d15f;
color:white;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0c1b35;
display:flex;
justify-content:space-around;
padding:14px 0;
border-top:1px solid #1e3157;
}

.bottom-nav button{
background:none;
border:none;
color:white;
font-size:16px;
}

#adSection,
#depositSection,
#withdrawSection,
#referralSection{
display:none;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Quotex USA</div>

<div class="balance" id="balance">
$90.00
</div>

<button class="deposit-btn" onclick="showSection('depositSection')">
Deposit
</button>
</div>

<div class="selects">

<select>
<option>1m</option>
<option>5m</option>
<option>15m</option>
<option>30m</option>
</select>

<select>
<option>BTC/USD OTC</option>
<option>ETH/USD OTC</option>
<option>TON/USD OTC</option>
</select>

</div>

<div class="chart-box" id="chart"></div>

<div class="trade-box">

<div class="trade-card">
<h3>Timer</h3>
<input value="00:01:00">
</div>

<div class="trade-card">
<h3>Investment</h3>
<input value="100$">
</div>

</div>

<div class="buttons">
<button class="up" onclick="buyTrade()">UP</button>
<button class="down" onclick="sellTrade()">DOWN</button>
</div>

<div class="section">

<div id="depositSection" class="card">

<h2>Deposit</h2>

<br>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=USDT_ADDRESS">

<input placeholder="Enter Deposit Amount">

<input type="file">

<button>Confirm Deposit</button>

</div>

<div id="withdrawSection" class="card">

<h2>Withdraw</h2>

<input placeholder="USDT Address">

<input placeholder="Amount">

<button>Withdraw</button>

</div>

<div id="adSection" class="card">

<h2>Watch Ads & Earn</h2>

<br>

<h3 id="adsCount">0 / 100 Ads</h3>

<br>

<button onclick="watchAds()">
Watch Ads
</button>

</div>

<div id="referralSection" class="card">

<h2>Referral</h2>

<br>

<p>Your Reward: $0.10 Per Active Referral</p>

<br>

<input value="https://t.me/YOUR_BOT?start=ref123">

</div>

</div>

<div class="bottom-nav">

<button onclick="hideAll()">🏠 Home</button>

<button onclick="hideAll()">📈 Market</button>

<button onclick="showSection('depositSection')">💰 Deposit</button>

<button onclick="showSection('adSection')">🎁 Ads</button>

<button onclick="showSection('referralSection')">👥 Referral</button>

<button onclick="showSection('withdrawSection')">💬 Support</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>

function hideAll(){
document.getElementById("depositSection").style.display="none";
document.getElementById("withdrawSection").style.display="none";
document.getElementById("adSection").style.display="none";
document.getElementById("referralSection").style.display="none";
}

function showSection(id){
hideAll();
document.getElementById(id).style.display="block";
}

function buyTrade(){
alert("BUY Trade Opened");
}

function sellTrade(){
alert("SELL Trade Opened");
}

let ads = 0;

function watchAds(){

window.open("https://your-adsterra-link.com","_blank");

setTimeout(()=>{

ads++;

document.getElementById("adsCount").innerHTML =
ads + " / 100 Ads";

},5000);

}

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
layout:{
background:{color:'#08152d'},
textColor:'#DDD',
},
grid:{
vertLines:{color:'rgba(255,255,255,0.05)'},
horzLines:{color:'rgba(255,255,255,0.05)'},
},
width:window.innerWidth-20,
height:420
});

const candleSeries = chart.addCandlestickSeries();

let data = [];

let time = Math.floor(Date.now()/1000)-60*50;

let price = 68400;

for(let i=0;i<50;i++){

let open = price;
let close = open + (Math.random()-0.5)*400;

let high = Math.max(open,close)+100;
let low = Math.min(open,close)-100;

data.push({
time:time,
open:open,
high:high,
low:low,
close:close
});

price=close;
time+=60;
}

candleSeries.setData(data);

setInterval(()=>{

let last = data[data.length-1];

let open = last.close;

let close = open + (Math.random()-0.5)*300;

let high = Math.max(open,close)+50;
let low = Math.min(open,close)-50;

let newCandle = {
time:last.time+60,
open,
high,
low,
close
};

data.push(newCandle);

candleSeries.update(newCandle);

},3000);

</script>

</body>
</html>
