<!DOCTYPE html>
<html>
<head>
  <title>Quotex USA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0B1220;
      color:white;
    }

    .container{
      max-width:420px;
      margin:auto;
      padding:15px;
    }

    .card{
      background:#111827;
      border-radius:20px;
      padding:20px;
      margin-bottom:15px;
    }

    .title{
      color:#22c55e;
      font-size:32px;
      font-weight:bold;
    }

    .balance{
      font-size:30px;
      color:#22c55e;
      font-weight:bold;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      color:white;
      font-size:18px;
      font-weight:bold;
      margin-top:10px;
    }

    .green{
      background:#22c55e;
    }

    .red{
      background:#ef4444;
    }

    .blue{
      background:#3b82f6;
    }

    .market{
      background:#0B1220;
      padding:15px;
      border-radius:15px;
      margin-top:15px;
    }

    .chart{
      display:flex;
      align-items:flex-end;
      gap:6px;
      height:180px;
      margin-top:20px;
    }

    .bar{
      width:18px;
      border-radius:10px;
    }

    .greenbar{
      background:#22c55e;
    }

    .redbar{
      background:#ef4444;
    }

    .asset{
      background:#0B1220;
      padding:15px;
      border-radius:15px;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
    }

    .qr{
      width:180px;
      border-radius:20px;
      margin-top:15px;
    }

    .bottom{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .bottom button{
      background:none;
      border:none;
      color:white;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">Quotex USA</div>
    <p>Professional Trading Dashboard</p>

    <p>UID: QTX928173</p>

    <p>Live Balance</p>
    <div class="balance">$0.00</div>
  </div>

  <div class="card">
    <h2>Trading Market</h2>

    <div class="market">

      <h2>BTC/USD</h2>
      <p>$68,420.50</p>

      <div class="chart">
        <div class="bar greenbar" style="height:40%"></div>
        <div class="bar redbar" style="height:70%"></div>
        <div class="bar greenbar" style="height:50%"></div>
        <div class="bar redbar" style="height:90%"></div>
        <div class="bar greenbar" style="height:60%"></div>
        <div class="bar redbar" style="height:100%"></div>
        <div class="bar greenbar" style="height:70%"></div>
      </div>

      <button class="btn green">BUY / UP</button>
      <button class="btn red">SELL / DOWN</button>

    </div>
  </div>

  <div class="card">
    <h2>Market Assets</h2>

    <div class="asset">
      <div>BTC/USD</div>
      <div style="color:#22c55e">+2.14%</div>
    </div>

    <div class="asset">
      <div>ETH/USD</div>
      <div style="color:#22c55e">+1.82%</div>
    </div>

    <div class="asset">
      <div>EUR/USD</div>
      <div style="color:red">-0.34%</div>
    </div>
  </div>

  <div class="card">
    <h2>USDT TRX Deposit</h2>

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=TEjTJkW6WJBg9fPkDSAVTdiU7t3pdVpPmy" class="qr">

    <p>
      TEjTJkW6WJBg9fPkDSAVTdiU7t3pdVpPmy
    </p>
  </div>

  <div class="card">
    <h2>Ads Reward System</h2>

    <a href="https://www.effectivecpmnetwork.com/axxe4pitp?key=5c32c5e18f9ad7f0378955eafebfbac0">
      <button class="btn green">Watch Ads & Earn</button>
    </a>

    <p>1 / 100 Completed</p>
  </div>

  <div class="card">
    <h2>Customer Support</h2>

    <a href="https://whatsapp.com/channel/0029VbCvfzcAojYu4HJSKn3a">
      <button class="btn green">WhatsApp Support</button>
    </a>

    <button class="btn blue">Telegram Support</button>
  </div>

</div>

<div class="bottom">
  <button>🏠 Home</button>
  <button>📈 Trade</button>
  <button>💰 Wallet</button>
  <button>👤 Profile</button>
</div>

</body>
</html>
