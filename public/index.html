<script>

let demoBalance = 10000;
let liveBalance = 0;
let adsCount = 0;

let adOpened = false;
let adReward = 0.02;

function openAd(){

adOpened = true;

window.open(
"https://www.effectivecpmnetwork.com/axxe4pitp?key=5c32c5e18f9ad7f0378955eafebfbac0",
"_blank"
);

setTimeout(()=>{

if(adOpened){

adsCount++;

liveBalance += adReward;

document.getElementById("adsProgress")
.innerHTML = adsCount + "/100";

document.getElementById("liveBalance")
.innerHTML = liveBalance.toFixed(2) + "$";

alert("Ad Completed +0.02$");

}

},15000);

}

window.onfocus = function(){

adOpened = false;

}

function confirmDeposit(){

let amount =
Number(document.getElementById("depositAmount").value);

if(amount < 10){

alert("Minimum Deposit 10$");

return;

}

liveBalance += amount;

document.getElementById("liveBalance")
.innerHTML = liveBalance.toFixed(2) + "$";

alert("Deposit Request Sent To Admin Panel");

}

function withdrawNow(){

let amount =
Number(document.getElementById("withdrawAmount").value);

if(amount < 20){

alert("Minimum Withdrawal 20$");

return;

}

if(amount > liveBalance){

alert("Insufficient Balance");

return;

}

liveBalance -= amount;

document.getElementById("liveBalance")
.innerHTML = liveBalance.toFixed(2) + "$";

alert("Withdrawal Request Sent");

}

document.getElementById("timeSelect")
.addEventListener("change", function(){

alert("Trade Time: " + this.value + " seconds");

});

document.getElementById("marketSelect")
.addEventListener("change", function(){

alert("Market Changed To: " + this.value);

});

document.getElementById("accountType")
.addEventListener("change", function(){

if(this.value === "demo"){

alert("Demo Account Selected");

}else{

alert("Live Account Selected");

}

});

</script>
